name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies (local + jobs + dev)
        run: uv sync --frozen --group local --group jobs --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest tests/ -q

      - name: dbt parse
        working-directory: dbt
        env:
          # Dummy values — `dbt parse` only validates syntax + Jinja, no DB connection.
          GCP_PROJECT_ID: ci-dummy
          BQ_DATASET: ci_dummy
          GOOGLE_APPLICATION_CREDENTIALS: /dev/null
        run: uv run dbt parse --profiles-dir .
